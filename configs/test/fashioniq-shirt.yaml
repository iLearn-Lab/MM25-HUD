fashioniq-shirt:
  dataname: fashioniq-shirt
  _target_: src.data.fashioniq.FashionIQTestDataModule

  batch_size: ${machine.batch_size}
  num_workers: ${machine.num_workers}

  annotation:  ./data/CIR_data/fashion_iq_data/ # captions/cap.shirt.val.json
  annotation_cap:  ./data/CIR_data/fashion_iq_data/captions/image_captions_shirt_val.json
  targets: ./data/CIR_data/fashion_iq_data/image_splits/split.shirt.val.json

  img_dirs: ./data/CIR_data/fashion_iq_data/images/
  emb_dirs: ${paths.datasets_dir}/fashion-iq/${model.basemodel}-embs-large/

  image_size: ${model.ckpt.image_size}
  category: shirt
  test:
    _target_: src.test.${model.basemodel}.fashioniq.TestFashionIQ_Ori
    category: shirt
